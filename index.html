const LANGUAGES = [

const LESSONS_BY_LANG = {

      { id: "en-a1-2", type: "reading", title: "Mi primer email", xp: 18,
        exercise: { passage: "Hi, I'm Alex. I live in London. I work as a designer.", q: "¿Dónde vive Alex?", opts: ["Londres", "París", "Madrid"], correct: 0 } },
      { id: "en-a1-3", type: "listening", title: "Escucha y responde", xp: 18,
        exercise: { audioText: "The train leaves at seven in the morning.", q: "¿A qué hora sale el tren?", opts: ["7:00 AM", "7:00 PM", "5:00 AM"], correct: 0 } },
      { id: "en-a1-4", type: "conversation", title: "Conoce a alguien", xp: 20,

    ],
    A2: [
      { id: "en-a2-1", type: "grammar", title: "Pasado simple", xp: 16,
        exercise: { explain: "I walked, she watched, they played.", q: "Yesterday I ___ to the park.", opts: ["walked", "walk", "walking"], correct: 0 } },
      { id: "en-a2-2", type: "listening", title: "Un mensaje de voz", xp: 18,
        exercise: { audioText: "Can you buy some milk and bread on your way home?", q: "¿Qué le piden comprar?", opts: ["Leche y pan", "Huevos y queso", "Fruta"], correct: 0 } },
      { id: "en-a2-3", type: "conversation", title: "En el café", xp: 20,
        exercise: { bot: "Hi, welcome! What would you like to order?", hint: "Di: I'd like a coffee, please." } },
    ],
  },
  fr: {
    A1: [
      { id: "fr-a1-1", type: "grammar", title: "Être au présent", xp: 15,
        exercise: { explain: "Je suis, tu es, il/elle est.", q: "Je ___ étudiant.", opts: ["suis", "es", "est"], correct: 0 } },
      { id: "fr-a1-2", type: "listening", title: "Écoute et réponds", xp: 18,

function getLessons(langId, level) {
  return LESSONS_BY_LANG[langId]?.[level] || [
    { id: `${langId}-${level}-1`, type: "grammar", title: "Gramática esencial", xp: 15,
      exercise: { explain: `Bases del nivel ${level}`, q: "Elige la forma correcta", opts: ["Opción A", "Opción B", "Opción C"], correct: 0 } },
    { id: `${langId}-${level}-2`, type: "listening", title: "Ejercicio de escucha", xp: 18,
      exercise: { audioText: "This is a short listening practice sentence.", q: "¿De qué trata el audio?", opts: ["Una práctica de escucha", "Una receta", "El clima"], correct: 0 } },
  ];
}

// Habla un texto en voz alta usando el navegador (sin API externa, gratis)
function speak(text, langCode) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = langCode || "en-US";
  utter.rate = 0.95;
  window.speechSynthesis.speak(utter);
}

// Hook para usar el micrófono (reconocimiento de voz del navegador)
function useSpeechRecognition(langCode) {
  const [listening, setListening] = useState(false);
  const [supported] = useState(() => "webkitSpeechRecognition" in window || "SpeechRecognition" in window);

  const start = useCallback((onResult) => {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Rec) return;
    const rec = new Rec();
    rec.lang = langCode || "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onstart = () => setListening(true);
    rec.onend = () => setListening(false);
    rec.onerror = () => setListening(false);
    rec.onresult = (e) => onResult(e.results[0][0].transcript);
    rec.start();
  }, [langCode]);

  return { listening, supported, start };
}

async function callFunction(name, body, token) {
  const res = await fetch(`/.netlify/functions/${name}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    body: JSON.stringify(body || {}),
  });
  return res.json();
}

function Button({ children, onClick, className = "", disabled }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={`h-[52px] rounded-[14px] font-semibold transition active:scale-[0.98] disabled:opacity-40 ${className}`}
    >
      {children}
    </button>
  );
}

function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setErr("");
    if (!email || !password) return setErr("Completa email y contraseña.");
    setLoading(true);
    try {
      if (mode === "signup") {
        const { error } = await sb.auth.signUp({
          email, password, options: { data: { name } },
        });
        if (error) throw error;
        setErr("Cuenta creada. Revisa tu email si Supabase requiere confirmación, o inicia sesión.");
        setMode("login");
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        onAuthed(data.session);
      }
    } catch (e) {
      setErr(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-6">
      <div className="w-full max-w-[380px]">
        <div className="flex flex-col items-center mb-8">
          <div className="w-[72px] h-[72px] rounded-[20px] bg-[#CCFF00] flex items-center justify-center mb-4">
            <span className="text-[30px] font-black text-black">L</span>
          </div>
          <h1 className="text-[30px] font-bold">LinguaFlux</h1>
          <p className="text-white/50 text-sm mt-1">Aprende idiomas hablando de verdad</p>
        </div>
        <div className="bg-[#1C1C1F] rounded-[20px] p-6 border border-white/10 space-y-3">
          {mode === "signup" && (
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Tu nombre"
              className="w-full h-12 px-4 rounded-xl bg-[#0F0F12] border border-white/10 outline-none" />
          )}
          <input value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" type="email"
            className="w-full h-12 px-4 rounded-xl bg-[#0F0F12] border border-white/10 outline-none" />
          <input value={password} onChange={e => setPassword(e.target.value)} placeholder="Contraseña" type="password"
            className="w-full h-12 px-4 rounded-xl bg-[#0F0F12] border border-white/10 outline-none" />
          {err && <p className="text-[12px] text-amber-300">{err}</p>}
          <Button onClick={submit} disabled={loading} className="w-full bg-[#7C3AED] text-white">
            {loading ? "Procesando..." : mode === "signup" ? "Crear cuenta" : "Entrar"}
          </Button>
          <button onClick={() => setMode(mode === "signup" ? "login" : "signup")}
            className="w-full text-center text-[13px] text-white/50 hover:text-white py-1">
            {mode === "signup" ? "¿Ya tienes cuenta? Inicia sesión" : "¿Nuevo? Crea una cuenta"}
          </button>
        </div>
      </div>
    </div>
  );
}

function PaywallScreen({ session, onSubscribed }) {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const subscribe = async () => {
    setLoading(true);
    setErr("");
    try {
      const res = await callFunction("create-checkout-session", {
        userId: session.user.id,
        email: session.user.email,
      });
      if (res.url) window.location.href = res.url;
      else setErr(res.error || "No se pudo iniciar el pago.");
    } catch (e) {
      setErr(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-6">
      <div className="w-full max-w-[380px] bg-[#1C1C1F] rounded-[24px] p-6 border border-white/10 text-center">
        <h2 className="text-[22px] font-bold mb-2">Desbloquea LinguaFlux</h2>
        <p className="text-white/50 text-[13px] mb-6">Suscripción mensual para acceder a todas las lecciones y conversación con IA.</p>
        {err && <p className="text-[12px] text-amber-300 mb-3">{err}</p>}
        <Button onClick={subscribe} disabled={loading} className="w-full bg-[#CCFF00] text-black">
          {loading ? "Redirigiendo a pago..." : "Suscribirme"}
        </Button>
        <button onClick={() => sb.auth.signOut()} className="w-full text-[12px] text-white/40 mt-4">
          Cerrar sesión
        </button>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [subscribed, setSubscribed] = useState(null); // null = cargando
  const [view, setView] = useState("chooseLang");
  const [lang, setLang] = useState(null);
  const [level, setLevel] = useState("A1");
  const [progress, setProgress] = useState({ completed: [], xp: 0, streak: 1 });
  const [activeLesson, setActiveLesson] = useState(null);
  const [selected, setSelected] = useState(null);
  const [correct, setCorrect] = useState(null);
  const [chat, setChat] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [adminStats, setAdminStats] = useState(null);
  const speechRec = useSpeechRecognition(lang?.code);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  const loadProfileAndSub = useCallback(async () => {
    if (!session) return;
    const { data: p } = await sb.from("profiles").select("*").eq("id", session.user.id).single();
    setProfile(p);
    const { data: s } = await sb.from("subscriptions").select("status").eq("user_id", session.user.id).maybeSingle();
    setSubscribed(s?.status === "active");
  }, [session]);

  useEffect(() => { loadProfileAndSub(); }, [loadProfileAndSub]);

  const loadProgress = useCallback(async (langId) => {
    if (!session) return;
    const { data } = await sb.from("progress").select("*").eq("user_id", session.user.id).eq("language_id", langId).maybeSingle();
    if (data) setProgress({ completed: data.completed_lessons || [], xp: data.xp || 0, streak: data.streak || 1 });
    else setProgress({ completed: [], xp: 0, streak: 1 });
  }, [session]);

  const saveProgress = async (langId, lvl, completed, xp, streak) => {
    if (!session) return;
    await sb.from("progress").upsert({
      user_id: session.user.id, language_id: langId, level: lvl,
      completed_lessons: completed, xp, streak, updated_at: new Date().toISOString(),
    }, { onConflict: "user_id,language_id" });
  };

  const pickLang = (l) => { setLang(l); loadProgress(l.id); setView("home"); };

  const openLesson = (lesson) => {
    setActiveLesson(lesson); setSelected(null); setCorrect(null);
    if (lesson.type === "conversation") {
      setChat([{ role: "bot", text: lesson.exercise.bot }]);
      setTimeout(() => speak(lesson.exercise.bot, lang.code), 300);
    }
    setView("lesson");
  };

  const answer = (idx) => {
    if (!activeLesson) return;
    setSelected(idx);
    const ok = idx === activeLesson.exercise.correct;
    setCorrect(ok);
    if (ok && !progress.completed.includes(activeLesson.id)) {
      const completed = [...progress.completed, activeLesson.id];
      const xp = progress.xp + activeLesson.xp;
      setProgress(p => ({ ...p, completed, xp }));
      saveProgress(lang.id, level, completed, xp, progress.streak);
    }
  };

  const sendChat = async () => {
    const text = chatInput.trim();
    if (!text) return;
    const next = [...chat, { role: "user", text }];
    setChat(next);
    setChatInput("");
    const res = await callFunction("groq-chat", {
      messages: next.map(m => ({ role: m.role === "bot" ? "assistant" : "user", content: m.text })),
      level, langName: lang.name, langCode: lang.code,
    });
    const reply = res.reply || "¡Bien! Sigue practicando. (Modo demo: configura GROQ_API_KEY en el servidor para respuestas reales)";
    setChat(c => [...c, { role: "bot", text: reply }]);
    speak(reply, lang.code);
  };

  const openAdmin = async () => {
    const token = session.access_token;
    const res = await callFunction("admin-stats", {}, token);
    setAdminStats(res);
    setView("admin");
  };

  if (!session) return <AuthScreen onAuthed={setSession} />;
  if (subscribed === null) return <div className="min-h-screen flex items-center justify-center text-white/40">Cargando...</div>;
  if (!subscribed) return <PaywallScreen session={session} />;

  return (
    <div className="min-h-screen max-w-[900px] mx-auto pb-10">
      <div className="px-5 py-4 flex items-center justify-between border-b border-white/10">
        <div className="font-semibold">LinguaFlux</div>
        <div className="flex items-center gap-2 text-[12px]">
          {profile?.is_admin && (
            <button onClick={openAdmin} className="px-3 h-8 rounded-full bg-white/10">Admin</button>
          )}
          <button onClick={() => sb.auth.signOut()} className="px-3 h-8 rounded-full bg-white/10">Salir</button>
        </div>
      </div>

      {view === "chooseLang" && (
        <div className="px-5 py-8 grid grid-cols-2 md:grid-cols-3 gap-3">
          {LANGUAGES.map(l => (
            <button key={l.id} onClick={() => pickLang(l)}
              className="bg-[#1C1C1F] rounded-2xl p-5 border border-white/10 text-left hover:border-white/30">
              <div className="text-[32px]">{l.flag}</div>
              <div className="font-semibold mt-2">{l.name}</div>
            </button>
          ))}
        </div>
      )}

      {view === "home" && lang && (
        <div className="px-5 py-6">
          <div className="flex items-center gap-3 mb-2">
            <span className="text-[26px]">{lang.flag}</span>
            <h2 className="text-[22px] font-bold">{lang.name}</h2>
            <select value={level} onChange={e => setLevel(e.target.value)} className="ml-auto bg-[#1C1C1F] border border-white/10 rounded-lg px-2 py-1 text-sm">
              {LEVELS.map(lv => <option key={lv} value={lv}>{lv}</option>)}
            </select>
          </div>
          <div className="text-[12px] text-white/40 mb-4">XP: {progress.xp} · Racha: {progress.streak} días</div>
          <div className="grid gap-3">
            {getLessons(lang.id, level).map(les => (
              <button key={les.id} onClick={() => openLesson(les)}
                className="text-left bg-[#1C1C1F] rounded-2xl p-4 border border-white/10 flex items-center gap-3 hover:border-white/30">
                <div className="w-10 h-10 rounded-xl bg-[#0F0F12] border border-white/10 grid place-items-center">
                  {progress.completed.includes(les.id) ? "✅" : "📘"}
                </div>
                <div>
                  <div className="font-medium">{les.title}</div>
                  <div className="text-[11px] text-white/40">{les.type} · {les.xp} XP</div>
                </div>
              </button>
            ))}
          </div>
          <button onClick={() => setView("chooseLang")} className="mt-6 text-[12px] text-white/40">← Cambiar idioma</button>
        </div>
      )}

      {view === "lesson" && activeLesson && (
        <div className="px-5 py-6 max-w-[600px] mx-auto">
          <button onClick={() => setView("home")} className="text-[12px] text-white/40 mb-4">← Volver</button>
          {activeLesson.type === "grammar" && (
            <div>
              <div className="bg-[#1C1C1F] rounded-2xl p-4 border border-white/10 mb-4 text-[14px]">{activeLesson.exercise.explain}</div>
              <h3 className="font-semibold mb-3">{activeLesson.exercise.q}</h3>
              <div className="grid gap-2">
                {activeLesson.exercise.opts.map((o, i) => (
                  <button key={i} onClick={() => selected === null && answer(i)}
                    className={`h-12 rounded-xl border text-left px-4 ${
                      correct !== null && i === activeLesson.exercise.correct ? "bg-[#CCFF00] text-black border-[#CCFF00]" :
                      selected === i ? "bg-white/10 border-white/20" : "bg-[#1C1C1F] border-white/10"}`}>
                    {o}
                  </button>
                ))}
              </div>
              {correct !== null && <div className="mt-4 text-[13px]">{correct ? `¡Correcto! +${activeLesson.xp} XP` : "Revisa la respuesta correcta arriba."}</div>}
            </div>
          )}
          {activeLesson.type === "reading" && (
            <div>
              <div className="bg-[#1C1C1F] rounded-2xl p-4 border border-white/10 mb-4 text-[14px]">
                {activeLesson.exercise.passage}
                <button onClick={() => speak(activeLesson.exercise.passage, lang.code)}
                  className="ml-2 align-middle text-[16px]" title="Escuchar">🔊</button>
              </div>
              <h3 className="font-semibold mb-3">{activeLesson.exercise.q}</h3>
              <div className="grid gap-2">
                {activeLesson.exercise.opts.map((o, i) => (
                  <button key={i} onClick={() => selected === null && answer(i)}
                    className={`h-12 rounded-xl border text-left px-4 ${
                      correct !== null && i === activeLesson.exercise.correct ? "bg-[#CCFF00] text-black border-[#CCFF00]" :
                      selected === i ? "bg-white/10 border-white/20" : "bg-[#1C1C1F] border-white/10"}`}>
                    {o}
                  </button>
                ))}
              </div>
            </div>
          )}
          {activeLesson.type === "listening" && (
            <div>
              <div className="bg-[#1C1C1F] rounded-2xl p-6 border border-white/10 mb-4 text-center">
                <button onClick={() => speak(activeLesson.exercise.audioText, lang.code)}
                  className="w-16 h-16 rounded-full bg-[#CCFF00] text-black text-[26px] grid place-items-center mx-auto">▶️</button>
                <p className="text-[11px] text-white/40 mt-2">Toca para escuchar el audio</p>
              </div>
              <h3 className="font-semibold mb-3">{activeLesson.exercise.q}</h3>
              <div className="grid gap-2">
                {activeLesson.exercise.opts.map((o, i) => (
                  <button key={i} onClick={() => selected === null && answer(i)}
                    className={`h-12 rounded-xl border text-left px-4 ${
                      correct !== null && i === activeLesson.exercise.correct ? "bg-[#CCFF00] text-black border-[#CCFF00]" :
                      selected === i ? "bg-white/10 border-white/20" : "bg-[#1C1C1F] border-white/10"}`}>
                    {o}
                  </button>
                ))}
              </div>
            </div>
          )}
          {activeLesson.type === "conversation" && (
            <div>
              <div className="space-y-2 mb-4">
                {chat.map((m, i) => (
                  <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
                    <div className={`max-w-[75%] rounded-2xl px-4 py-2 text-[13px] flex items-center gap-2 ${m.role === "user" ? "bg-[#7C3AED]" : "bg-[#1C1C1F] border border-white/10"}`}>
                      {m.text}
                      {m.role === "bot" && (
                        <button onClick={() => speak(m.text, lang.code)} className="text-[13px]" title="Escuchar">🔊</button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
              {activeLesson.exercise.hint && (
                <p className="text-[11px] text-white/40 mb-2">💡 {activeLesson.exercise.hint}</p>
              )}
              <div className="flex gap-2">
                <input value={chatInput} onChange={e => setChatInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && sendChat()}
                  placeholder="Escribe o usa el micrófono..."
                  className="flex-1 h-12 rounded-xl bg-[#1C1C1F] border border-white/10 px-4 outline-none" />
                {speechRec.supported && (
                  <Button
                    onClick={() => speechRec.start((text) => setChatInput(text))}
                    className={`px-4 ${speechRec.listening ? "bg-red-500 text-white" : "bg-white/10 text-white"}`}
                    title="Hablar">
                    {speechRec.listening ? "🔴" : "🎤"}
                  </Button>
                )}
                <Button onClick={sendChat} className="bg-[#CCFF00] text-black px-5">Enviar</Button>
              </div>
            </div>
          )}
        </div>
      )}

      {view === "admin" && (
        <div className="px-5 py-6">
          <button onClick={() => setView("home")} className="text-[12px] text-white/40 mb-4">← Volver</button>
          <h2 className="text-[22px] font-bold mb-4">Panel de administración</h2>
          {!adminStats ? <p className="text-white/40">Cargando...</p> : adminStats.error ? (
            <p className="text-amber-300">{adminStats.error}</p>
          ) : (
            <div className="grid md:grid-cols-3 gap-4">
              <div className="bg-[#1C1C1F] rounded-2xl p-5 border border-white/10">
                <div className="text-[11px] text-white/40 uppercase">Usuarios</div>
                <div className="text-[28px] font-bold mt-1">{adminStats.totalUsers}</div>
              </div>
              <div className="bg-[#1C1C1F] rounded-2xl p-5 border border-white/10">
                <div className="text-[11px] text-white/40 uppercase">Suscripciones activas</div>
                <div className="text-[28px] font-bold mt-1">{adminStats.activeSubs}</div>
              </div>
              <div className="bg-[#1C1C1F] rounded-2xl p-5 border border-white/10">
                <div className="text-[11px] text-white/40 uppercase">Filas de progreso</div>
                <div className="text-[28px] font-bold mt-1">{adminStats.lessonsDone}</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
